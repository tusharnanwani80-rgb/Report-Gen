<!DOCTYPE html>

    .form-grid { grid-template-columns: 1fr; }
    .field.full { grid-column: 1; }
    .action-row { grid-template-columns: 1fr; }

<body>

<div class="page-wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-row">
      <img src="https://i.postimg.cc/x9mDND2Q/Ttc-logo.png" alt="TTC Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/48/E8835A/FFFFFF?text=TTC'" />
      <span class="brand-name">Tushar Tuition Classes</span>
    </div>
    <h1>Progress Report<br/><span>Generator</span></h1>
    <p>Fill in 5 fields. Get a heartfelt parent message in seconds.</p>
  </div>

  <div class="divider"><span class="divider-icon">✦</span></div>

  <!-- FORM CARD -->
  <div class="card">
    <div class="card-title"><span class="dot"></span> Student Details</div>
    <div class="form-grid">

      <div class="field">
        <label>Student Name</label>
        <input type="text" id="studentName" placeholder="e.g. Rohan Sharma" />
      </div>

      <div class="field">
        <label>Class</label>
        <select id="studentClass">
          <option value="">Select Class</option>
          <option>Class 1</option><option>Class 2</option><option>Class 3</option>
          <option>Class 4</option><option>Class 5</option><option>Class 6</option>
          <option>Class 7</option><option>Class 8</option><option>Class 9</option>
        </select>
      </div>

      <div class="field">
        <label>Subject(s)</label>
        <input type="text" id="subjects" placeholder="e.g. Maths, Science" />
      </div>

      <div class="field">
        <label>Attendance</label>
        <div class="attend-row">
          <input type="number" id="attendPresent" placeholder="Present" min="0" />
          <input type="number" id="attendTotal" placeholder="Total" min="1" />
        </div>
      </div>

      <div class="field full">
        <label>What did the student do well? ✨</label>
        <textarea id="strength" placeholder="e.g. Improved in fractions, asks good questions, regular attendance..."></textarea>
      </div>

      <div class="field full">
        <label>What are we working on? 🎯</label>
        <textarea id="improvement" placeholder="e.g. Word problems in Maths, English grammar..."></textarea>
      </div>

      <div class="field full">
        <label>Overall Progress This Month</label>
        <div class="mood-row" id="moodRow">
          <button class="mood-btn active" data-mood="Excellent 🌟">Excellent 🌟</button>
          <button class="mood-btn" data-mood="Good 👍">Good 👍</button>
          <button class="mood-btn" data-mood="Improving 📈">Improving 📈</button>
          <button class="mood-btn" data-mood="Needs Focus 🎯">Needs Focus 🎯</button>
        </div>
      </div>

      <div class="field full">
        <label>Message Language</label>
        <div class="lang-row">
          <button class="lang-btn active" id="langEn" onclick="setLang('en')">English</button>
          <button class="lang-btn" id="langHi" onclick="setLang('hi')">Hindi (हिंदी)</button>
          <button class="lang-btn" id="langMr" onclick="setLang('mr')">Marathi (मराठी)</button>
        </div>
      </div>

    </div>

    <button class="btn-generate" id="generateBtn" onclick="generateReport()">
      <div class="spinner"></div>
      <span class="btn-text">✨ Generate Parent Message</span>
    </button>
  </div>

  <!-- OUTPUT CARD -->
  <div class="output-card" id="outputCard">
    <div class="output-header">
      <div class="output-label">📩 Ready to Send <span class="badge">GENERATED</span></div>
    </div>
    <div class="message-box" id="messageBox"></div>
    <div class="action-row">
      <button class="btn-action btn-copy" onclick="copyMessage()">📋 Copy Message</button>
      <button class="btn-action btn-whatsapp" onclick="sendWhatsApp()">💬 Open in WhatsApp</button>
    </div>
  </div>

  <!-- HISTORY CARD -->
  <div class="history-card" id="historyCard">
    <div class="history-header">
      <div class="history-title">📋 Recent Reports</div>
      <button class="btn-clear" onclick="clearHistory()">Clear all</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    Powered by <span>TTC Wardha</span> × AI — Built for teachers who care ♥
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let selectedMood = "Excellent 🌟";
  let selectedLang = "en";
  let history = JSON.parse(localStorage.getItem('ttc_history') || '[]');

  // Mood buttons
  document.getElementById('moodRow').addEventListener('click', e => {
    if (e.target.classList.contains('mood-btn')) {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      selectedMood = e.target.dataset.mood;
    }
  });

  function setLang(lang) {
    selectedLang = lang;
    ['En','Hi','Mr'].forEach(l => document.getElementById('lang'+l).classList.remove('active'));
    document.getElementById('lang' + lang.charAt(0).toUpperCase() + lang.slice(1)).classList.add('active');
  }

  async function generateReport() {
    const name = document.getElementById('studentName').value.trim();
    const cls = document.getElementById('studentClass').value;
    const subjects = document.getElementById('subjects').value.trim();
    const present = document.getElementById('attendPresent').value;
    const total = document.getElementById('attendTotal').value;
    const strength = document.getElementById('strength').value.trim();
    const improvement = document.getElementById('improvement').value.trim();

    if (!name || !cls || !subjects || !strength) {
      showToast('Please fill in at least Name, Class, Subjects, and Strengths.');
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    const attendance = (present && total) ? `${present} out of ${total} classes attended` : 'not recorded';

    const langInstructions = {
      en: "Write entirely in English.",
      hi: "Write entirely in Hindi (Devanagari script). Use warm, simple Hindi a parent in a small town like Wardha would understand.",
      mr: "Write entirely in Marathi (Devanagari script). Use warm, simple Marathi a parent in Wardha, Maharashtra would understand."
    };

    const prompt = `You are a warm, caring teacher at Tushar Tuition Classes (TTC), a respected tuition centre in Wardha, Maharashtra, India. You are writing a monthly progress WhatsApp message to a parent about their child.

Student: ${name}
Class: ${cls}
Subjects: ${subjects}
Attendance: ${attendance}
Strengths this month: ${strength}
Areas we are working on: ${improvement}
Overall progress: ${selectedMood}

${langInstructions[selectedLang]}

Write a heartfelt, personal WhatsApp message (not an email). 
- Start with a warm greeting to the parent (use "Dear Parent" or equivalent)
- Mention the student's name naturally
- Celebrate their strengths genuinely and specifically
- Mention what we are working on in an encouraging, positive way
- End with a motivating line and a warm sign-off from "Tushar Sir / TTC Wardha"
- Use 1-2 relevant emojis naturally, not excessively
- Keep it between 80-120 words
- Tone: warm teacher, not corporate. Like a trusted family tutor.
- Do NOT use subject/heading lines. This is a WhatsApp chat message.`;

    const apiKey = ""; // Added automatically in the running environment
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
    
    const payload = {
        contents: [{ parts: [{ text: prompt }] }]
    };

    let success = false;
    let responseData = null;
    const maxRetries = 5;
    const delays = [1000, 2000, 4000, 8000, 16000];

    try {
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          
          if (response.ok) {
            responseData = await response.json();
            success = true;
            break;
          }
        } catch (err) {
          // Silent catch for retries
        }
        
        if (!success && i < maxRetries - 1) {
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }

      if (success && responseData?.candidates?.[0]?.content?.parts?.[0]?.text) {
        const message = responseData.candidates[0].content.parts[0].text.trim();
        document.getElementById('messageBox').textContent = message;
        
        const outputCard = document.getElementById('outputCard');
        outputCard.classList.add('visible');
        outputCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

        // Save to history
        const entry = {
          id: Date.now(),
          name,
          cls,
          subjects,
          mood: selectedMood,
          message,
          date: new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })
        };
        history.unshift(entry);
        if (history.length > 10) history.pop();
        localStorage.setItem('ttc_history', JSON.stringify(history));
        renderHistory();

        showToast('✅ Message ready! Copy or send via WhatsApp.');
      } else {
        showToast('API request failed. Please check your connection and try again.');
      }
    } catch (err) {
      showToast('Network error. Please check your connection.');
    }

    btn.classList.remove('loading');
    btn.disabled = false;
  }

  function copyMessage() {
    const msg = document.getElementById('messageBox').textContent;
    // Fallback for document copying, works better inside isolated environments
    const textarea = document.createElement('textarea');
    textarea.value = msg;
    document.body.appendChild(textarea);
    textarea.select();
    try {
        document.execCommand('copy');
        showToast('📋 Copied to clipboard!');
    } catch (err) {
        showToast('Failed to copy. Please select text manually.');
    } finally {
        document.body.removeChild(textarea);
    }
  }

  function sendWhatsApp() {
    const msg = document.getElementById('messageBox').textContent;
    const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  }

  function renderHistory() {
    const card = document.getElementById('historyCard');
    const list = document.getElementById('historyList');
    if (history.length === 0) { card.classList.remove('visible'); return; }
    card.classList.add('visible');
    list.innerHTML = history.map(h => `
      <div class="history-item" onclick="loadHistory(${h.id})">
        <div class="history-info">
          <div class="history-name">${h.name} · ${h.cls}</div>
          <div class="history-meta">${h.subjects} · ${h.mood} · ${h.date}</div>
        </div>
        <span class="history-arrow">→</span>
      </div>
    `).join('');
  }

  function loadHistory(id) {
    const entry = history.find(h => h.id === id);
    if (!entry) return;
    document.getElementById('messageBox').textContent = entry.message;
    document.getElementById('outputCard').classList.add('visible');
    document.getElementById('outputCard').scrollIntoView({ behavior: 'smooth' });
  }

  function clearHistory() {
    // using custom modal or simple confirm 
    if (!confirm('Clear all saved reports?')) return;
    history = [];
    localStorage.removeItem('ttc_history');
    renderHistory();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Init
  renderHistory();
</script>
